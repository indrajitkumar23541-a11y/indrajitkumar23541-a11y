<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#121217" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="250" rx="12" fill="url(#bg-grad)" stroke="#1a1a24" stroke-width="2" />
  <rect width="800" height="250" rx="12" fill="url(#grid)" />

  <!-- Cyberpunk UI Accents -->
  <!-- Top Left -->
  <path d="M -2 40 L 20 40 L 40 20 L 150 20" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow-blue)"/>
  <rect x="15" y="17" width="6" height="6" fill="#00f0ff" filter="url(#glow-blue)" />
  
  <!-- Bottom Right -->
  <path d="M 802 210 L 780 210 L 760 230 L 650 230" fill="none" stroke="#b026ff" stroke-width="2" filter="url(#glow-purple)"/>
  <rect x="779" y="227" width="6" height="6" fill="#b026ff" filter="url(#glow-purple)" />

  <!-- Top Right decorative blocks -->
  <rect x="740" y="20" width="10" height="4" fill="#333" />
  <rect x="755" y="20" width="25" height="4" fill="#00f0ff" filter="url(#glow-blue)" />
  
  <!-- Bottom Left decorative blocks -->
  <rect x="20" y="226" width="25" height="4" fill="#b026ff" filter="url(#glow-purple)" />
  <rect x="50" y="226" width="10" height="4" fill="#333" />

  <!-- Main Texts -->
  <text x="400" y="115" font-family="'Inter', 'Segoe UI', sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">
    INDRAJIT KUMAR
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="165" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#00f0ff" text-anchor="middle" filter="url(#glow-blue)" letter-spacing="3">
    FULL STACK DEVELOPER // AI ENGINEER
  </text>

  <!-- Micro text details -->
  <text x="80" y="231" font-family="monospace" font-size="10" fill="#666" letter-spacing="1">SYS.BOOT_SEQ: INITIALIZED // CYBER_CORE_V1.0</text>
  <text x="640" y="24" font-family="monospace" font-size="10" fill="#00f0ff" letter-spacing="1" filter="url(#glow-blue)">[ STATUS: ONLINE ]</text>
</svg>
