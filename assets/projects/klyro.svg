<svg width="400" height="180" viewBox="0 0 400 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#121217" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="180" rx="12" fill="url(#bg)" stroke="#1a1a24" stroke-width="2" />
  
  <!-- Cyberpunk Line -->
  <path d="M -1 30 L 15 15 L 120 15" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="120" cy="15" r="3" fill="#00f0ff" filter="url(#glow)" />
  
  <text x="25" y="65" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="1">KLYRO</text>
  
  <text x="25" y="95" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#8b949e">AI Powered Hybrid E-Commerce Platform</text>
  
  <!-- Tags -->
  <g transform="translate(25, 130)">
    <rect x="0" y="0" width="85" height="24" rx="12" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-opacity="0.4"/>
    <text x="42.5" y="16" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#00f0ff" text-anchor="middle">Microservices</text>
    
    <rect x="95" y="0" width="55" height="24" rx="12" fill="#b026ff" fill-opacity="0.1" stroke="#b026ff" stroke-opacity="0.4"/>
    <text x="122.5" y="16" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#d2a8ff" text-anchor="middle">Kafka</text>

    <rect x="160" y="0" width="55" height="24" rx="12" fill="#ff7b72" fill-opacity="0.1" stroke="#ff7b72" stroke-opacity="0.4"/>
    <text x="187.5" y="16" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#ff7b72" text-anchor="middle">Redis</text>
    
    <rect x="225" y="0" width="50" height="24" rx="12" fill="#f1e05a" fill-opacity="0.1" stroke="#f1e05a" stroke-opacity="0.4"/>
    <text x="250" y="16" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e3d04d" text-anchor="middle">JWT</text>
  </g>

  <!-- Animated-like Icon -->
  <g transform="translate(340, 30)">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
    <path d="M 12 20 L 18 26 L 28 14" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#glow)"/>
  </g>
</svg>
