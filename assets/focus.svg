  <rect x="20" y="115" width="248" height="6" rx="3" fill="#00f0ff" filter="url(#glow-blue)"/>

  <!-- Bar 3 -->
  <text x="20" y="140" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">System Design &amp; Scalability</text>
  <text x="305" y="140" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">75%</text>
