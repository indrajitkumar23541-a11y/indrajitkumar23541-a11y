  <rect x="20" y="150" width="232" height="6" rx="3" fill="#b026ff" filter="url(#glow-purple)"/>

  <!-- Bar 4 -->
  <text x="20" y="175" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Open Source Contribution</text>
  <text x="305" y="175" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">70%</text>
  <rect x="20" y="185" width="310" height="6" rx="3" fill="#1f2438" />
  <rect x="20" y="185" width="217" height="6" rx="3" fill="#00f0ff" filter="url(#glow-blue)"/>

  <!-- Bar 5 -->
  <text x="20" y="210" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">DSA &amp; Problem Solving</text>
  <text x="305" y="210" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">85%</text>
  <rect x="20" y="220" width="310" height="6" rx="3" fill="#1f2438" />
