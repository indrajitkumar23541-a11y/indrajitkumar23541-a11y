<svg width="350" height="220" viewBox="0 0 350 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="350" height="220" rx="12" fill="#060913" stroke="#1f2438" stroke-width="2" />
  
  <text x="20" y="35" font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#00f0ff" letter-spacing="1" filter="url(#glow-blue)">CURRENT FOCUS</text>
  <line x1="20" y1="45" x2="330" y2="45" stroke="#1f2438" stroke-width="1" />

  <!-- Bar 1 -->
  <text x="20" y="70" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">Building AI Powered Products</text>
  <text x="305" y="70" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">90%</text>
  <rect x="20" y="80" width="310" height="6" rx="3" fill="#1f2438" />
  <rect x="20" y="80" width="279" height="6" rx="3" fill="#b026ff" filter="url(#glow-purple)"/>

  <!-- Bar 2 -->
  <text x="20" y="105" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#c9d1d9">LLM Integration &amp; AI Agents</text>
